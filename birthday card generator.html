<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Birthday Card Chaos Machine</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    :root {
      --purple: #7c3aed;
      --purple-light: #ede9fe;
      --orange: #f97316;
      --blue: #3b82f6;
      --blue-light: #dbeafe;
      --indigo: #4f46e5;
      --green: #22c55e;
      --pink: #ec4899;
      --pink-light: #fce7f3;
      --yellow-light: #fefce8;
      --white: #ffffff;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-700: #374151;
    }

    html, body {
      min-height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #93c5fd 0%, #fed7aa 50%, #a5b4fc 100%);
      background-attachment: fixed;
      padding: 24px 16px;
    }

    /* ⭐ STARS */
    .star {
      position: fixed;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: floatStar 6s infinite ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes floatStar {
      0%   { transform: translateY(0px); opacity: 0.2; }
      50%  { opacity: 1; }
      100% { transform: translateY(-40px); opacity: 0.2; }
    }

    .shooting-star {
      position: fixed;
      width: 160px;
      height: 4px;
      background: linear-gradient(90deg, white, transparent);
      opacity: 0;
      transform: rotate(-45deg);
      animation: shoot 7s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes shoot {
      0%   { transform: translate(0, 0) rotate(-45deg); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(-900px, 900px) rotate(-45deg); opacity: 0; }
    }

    /* LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--indigo), var(--purple), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 1rem;
      color: var(--gray-600);
      font-weight: 500;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* CARDS / PANELS */
    .panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      padding: 28px;
      border: 3px solid #d8b4fe;
    }

    .panel h2 {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--purple);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    /* INPUTS */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 2px solid var(--blue-light);
      font-size: 1rem;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: white;
      color: var(--gray-700);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus {
      border-color: var(--purple);
    }

    /* BUTTONS */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-direction: column;
    }

    @media (min-width: 480px) {
      .btn-row {
        flex-direction: row;
      }
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      cursor: pointer;
      color: white;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-generate {
      background: linear-gradient(135deg, var(--purple), var(--orange));
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
    }

    .btn-download {
      background: linear-gradient(135deg, var(--blue), var(--green));
      box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    }

    /* BIRTHDAY CARD */
    .card-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .card-bg {
      position: absolute;
      inset: 0;
      background: #a5b4fc;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      transform: rotate(-2deg);
    }

    .card-inner {
      position: relative;
      background: white;
      border-radius: 20px;
      margin: 6px;
      display: flex;
      overflow: hidden;
      min-height: 280px;
    }

    .card-left {
      width: 50%;
      background: linear-gradient(180deg, #dbeafe, #dcfce7);
      border-right: 2px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card-left-content {
      text-align: center;
    }

    .card-emoji {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 12px;
      line-height: 1;
    }

    .card-left h3 {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--indigo);
      letter-spacing: -0.02em;
    }

    .card-right {
      width: 50%;
      padding: 24px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cardMessage {
      font-family: "Poppins", sans-serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--gray-600);
      text-align: center;
      line-height: 1.6;
    }

    /* HISTORY PANEL */
    .history-panel {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      padding: 24px;
      border: 2px solid #e9d5ff;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .history-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--purple);
    }

    .saved-badge {
      background: var(--indigo);
      color: white;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 300px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .history-empty {
      color: var(--gray-400);
      font-style: italic;
      text-align: center;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .history-item {
      background: linear-gradient(135deg, var(--yellow-light), var(--pink-light));
      border-radius: 16px;
      padding: 14px;
      border: 1px solid #fbcfe8;
    }

    .history-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .history-name {
      font-weight: 600;
      color: var(--pink);
      font-size: 0.9rem;
    }

    .history-item-body {
      font-size: 0.85rem;
      color: var(--gray-700);
      line-height: 1.5;
    }

    /* RIGHT COLUMN */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
  </style>
</head>

<body>

<script>
  function createStars(count) {
    count = count || 60;
    for (var i = 0; i < count; i++) {
      var star = document.createElement("div");
      star.className = "star";
      var size = (3 + Math.random() * 5) + "px";
      star.style.width = size;
      star.style.height = size;
      star.style.left = (Math.random() * 100) + "vw";
      star.style.top = (Math.random() * 100) + "vh";
      star.style.animationDuration = (3 + Math.random() * 6) + "s";
      star.style.animationDelay = (Math.random() * 5) + "s";
      document.body.appendChild(star);
    }
  }

  function createShootingStars(count) {
    count = count || 6;
    for (var i = 0; i < count; i++) {
      var s = document.createElement("div");
      s.className = "shooting-star";
      s.style.left = (60 + Math.random() * 40) + "vw";
      s.style.top = (Math.random() * 40) + "vh";
      s.style.animationDelay = (Math.random() * 10) + "s";
      document.body.appendChild(s);
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    createStars();
    createShootingStars();
  });
</script>

<div class="container">

  <div class="header">
    <h1>
      🎉 <span class="gradient-text">Birthday Card Chaos Machine</span> 🎂
    </h1>
    <p>Generate birthday card messages for your favourite old people 😎</p>
  </div>

  <div class="grid">

    <!-- LEFT: INPUTS -->
    <div class="panel">
      <h2>✨ Create Your Birthday Message</h2>
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="Birthday Person's Name" autocomplete="off" />
        <input type="number" id="ageInput" placeholder="Their Age" min="1" max="150" autocomplete="off" />
        <div class="btn-row">
          <button class="btn btn-generate" onclick="generateMessage()">🎈 Generate Card</button>
          <button class="btn btn-download" onclick="downloadCard()">🎁 Download Card</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: CARD + HISTORY -->
    <div class="right-col">

      <!-- BIRTHDAY CARD -->
      <div class="card-wrapper" id="birthdayCard">
        <div class="card-bg"></div>
        <div class="card-inner">
          <div class="card-left">
            <div class="card-left-content">
              <span class="card-emoji">🎂</span>
              <h3>Happy Birthday!</h3>
            </div>
          </div>
          <div class="card-right">
            <p id="cardMessage">Your message appears here ✨</p>
          </div>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="history-panel">
        <div class="history-header">
          <h2>🕰 Previous Birthday Cards</h2>
          <span class="saved-badge" id="savedCount">0 saved</span>
        </div>
        <div class="history-list" id="historyContainer">
          <p class="history-empty">No birthday masterpieces yet...</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  var openers = ["Congratulations!", "Breaking News!", "Alert 🚨", "Scientific discovery:", "Official announcement:"];
  var jokes = [
    "you're now old enough to complain about the weather unironically.",
    "your back now makes more sounds than your Spotify playlist.",
    "your candles cost more than the cake.",
    "you've officially entered the 'make weird noises when standing up' era.",
    "your metabolism has left the group chat.",
    "you're basically a vintage collectible now.",
    "you now understand why people get excited over air fryers.",
    "your knees have started sending warning notifications."
  ];
  var extras = [
    "Still younger than a dinosaur though 🦖",
    "At least you still know your passwords... probably.",
    "Remember: wrinkles are just laugh receipts.",
    "Don't worry, cake calories disappear on birthdays.",
    "Time to pretend you enjoy gardening and herbal tea.",
    "You're aging like fine wine... slightly expensive and confusing."
  ];

  var history = [];

  function rand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function generateMessage() {
    var name = document.getElementById("nameInput").value.trim();
    var age = document.getElementById("ageInput").value.trim();

    if (!name || !age) {
      alert("Please enter both a name and an age!");
      return;
    }

    var message = rand(openers) + " " + name + " just turned " + age + "! " + rand(jokes) + " " + rand(extras);

    document.getElementById("cardMessage").textContent = message;

    history.unshift({ name: name, age: age, message: message });
    updateHistory();
  }

  function downloadCard() {
    var card = document.getElementById("birthdayCard");

    // Try html2canvas if available, otherwise fallback
    if (typeof html2canvas !== "undefined") {
      html2canvas(card, {
        backgroundColor: null,
        scale: 2,
        useCORS: true,
        allowTaint: true,
        logging: false
      }).then(function(canvas) {
        saveCanvas(canvas);
      }).catch(function() {
        fallbackDownload();
      });
    } else {
      fallbackDownload();
    }
  }

  function saveCanvas(canvas) {
    try {
      var link = document.createElement("a");
      link.download = "birthday-card.png";
      link.href = canvas.toDataURL("image/png");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    } catch(e) {
      fallbackDownload();
    }
  }

  function fallbackDownload() {
    // Mobile fallback: open card text in a new window for screenshot
    var name = document.getElementById("nameInput").value.trim() || "Friend";
    var msg = document.getElementById("cardMessage").textContent;
    var win = window.open("", "_blank");
    if (win) {
      win.document.write(
        '<html><head><meta name="viewport" content="width=device-width,initial-scale=1">' +
        '<style>body{font-family:Georgia,serif;background:linear-gradient(135deg,#a5b4fc,#fed7aa);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}' +
        '.card{background:white;border-radius:20px;padding:40px;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);}' +
        'h2{color:#4f46e5;font-size:1.8rem;margin-bottom:16px;}p{color:#374151;font-size:1.1rem;line-height:1.7;font-style:italic;}' +
        '.tip{margin-top:20px;color:#9ca3af;font-size:0.8rem;}</style></head><body>' +
        '<div class="card"><div style="font-size:3rem">🎂</div><h2>Happy Birthday!</h2><p>' + msg + '</p>' +
        '<p class="tip">Take a screenshot to save this card</p></div></body></html>'
      );
      win.document.close();
    } else {
      alert("Card message: " + msg + "\n\nTake a screenshot to save your card!");
    }
  }

  function updateHistory() {
    var container = document.getElementById("historyContainer");
    var badge = document.getElementById("savedCount");
    badge.textContent = history.length + " saved";
    container.innerHTML = "";

    history.forEach(function(card) {
      var div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML =
        '<div class="history-item-header">' +
          '<span class="history-name">' + escapeHtml(card.name) + ' · ' + escapeHtml(card.age) + '</span>' +
          '<span>🎉</span>' +
        '</div>' +
        '<div class="history-item-body">' + escapeHtml(card.message) + '</div>';
      container.appendChild(div);
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>

<!-- html2canvas loaded AFTER page for better mobile compat -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" async></script>

</body>
</html>
